<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Marquee Tag</title>
  <style>
    h1 {
    text-align: center;
}
  </style>
</head>
<body bgcolor="#fff">
  <h1>
    Marquee Tag Example
  </h1>
  <marquee behavior="scroll"> <!-- Behaviour can be alternate, slide,scroll -->
    <img src="images/cartoon-1.jpg" height="167"/>
    <img src="images/Mickey-mouse.jpg" width="250"/>
    <img src="images/cartoon.png" width="250"  height="167"/>
    <img src="images/Bugs-Bunny.jpg" width="250"  height="167"/>
    <img src="images/cartoons-classic-cartoons.jpg" width="250"  height="167"/>
    <img src="images/lemmling-Cartoon-elephant.svg" width="250"  height="167"/>
    <img src="images/winnie-the-pooh.jpg" width="250"  height="167"/>
  </marquee>
</body>
</html>
