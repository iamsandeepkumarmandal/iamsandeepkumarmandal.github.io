<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=320, user-scalable=0" id="viewport"/>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <!-- <header name = "Access-Control-Allow-Origin" value = "*" /> -->
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/jquery-2.1.1.min.js"></script>
    <script src="js/jquery-ui.min.js"></script>
    <script src="js/jquery.ui.touch-punch.min.js"></script>
    <script src="style.js"></script>
</head>
<body>
    <div class="main-class game-wrapper">
        <div id="page1" class="page">
        </div>
        <div id="page2" class="page">
            <div id="introscreen">
                <img src="assets/round1s.jpg" alt="">
            </div>
            <div id="game1area">
                <div id="messagearea">
                    <img src="assets/pickthecorrect.png" alt="" id="intro1">
                    <img src="assets/intro2.png" alt="" id="intro2">
                    <img src="assets/sequencematched.png" alt="" id="seq1">
                </div>
                <div id="dropperarea" class="ui-widget-header">

                </div>
                <div id="cardarea">
                    <div id="card1" class="card">
                        <img src="assets/card1.png" alt="">
                    </div>
                    <div id="card2" class="card">
                        <img src="assets/card2.png" alt="">
                    </div>
                    <div id="card3" class="card">
                        <img src="assets/card3.png" alt="">
                    </div>
                    <div id="card4" class="card">
                        <img src="assets/card4.png" alt="">
                    </div>
                </div>
                <div id="cursor">
                    <img src="assets/hand.png" alt="">
                </div>
            </div>
            <div id="game1won">
                <img src="assets/screen1won.jpg" alt="">
            </div>
        </div>
    </div> 
</body>
</html>
